<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overflow Example</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f0f0f0;
  margin: 0;
  padding: 20px;
  text-align: center;
}
.box {
  background-color: skyblue;
  color: black;
  padding: 20px;
 align-content: center;
  font-size: 25px;
  border-radius: 50px;
  transition: all 0.4s ease;
  overflow: auto;
  height:400px;
  width:400px;
  border-radius: 50%;
  margin: auto;
}
.box img{
width:200px;
height:200px;

}

</style>
</head>

<body>

<h2>Overflow CSS Feature</h2>
<p>Overflow property values are: visible, hidden, scroll, and auto.</p>

<div class="box">
 <img  src="maki.jpg" alt="maki manga picture">
</div>

</body>
</html>
