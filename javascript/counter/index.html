<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background:linear-gradient(to right,rgb(245, 242, 181),rgb(251, 255, 25));
            height: 100vh;
            text-align: center;
            font-weight: bold;
        }
        h1{
            color: green;
            text-align: center;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-weight: bold;
            font-size: 50px;
        }
        label{
            font-size: 90px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            display: block;
            text-align: center;
        }
         .btn{
            display: flex;
            flex-direction: row;
            justify-content: center;
            padding: 10px;
            gap: 20px;
         }
         button{
            height: 35px;
            width: 90px;
            border-radius: 10px;
            background-color: rgb(206, 255, 80);
            font-size: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
         }
         button:hover
        {
            transform: translate(-4px,-4px);
            background-color: hsl(208, 66%, 64%);
            box-shadow: 3px 3px 5px rgb(95, 94, 92);
        }
    </style>
</head>
<body>
    <h1>Counter</h1>
    <label id="number">0</label>1
    <div class="btn">
    <button id="raise">Raise</button>
    <button id="clear">Clear</button>
    <button id="down">Down</button>
    </div>
    <p id="msg"></p> 
    <script>
        const labelvalue=document.getElementById("number");
        const raiseBtn=document.getElementById("raise");
        const clearBtn=document.getElementById("clear");
        const downBtn=document.getElementById("down");
        const result=document.getElementById("msg");
        let count=0;
        raiseBtn.onclick=function(){
             count++;
             labelvalue.textContent=count;
             result.textContent="Counter Incrementation";
             result.style.color="red";
             result.style.fontWeight="bold";
             result.style.fontSize="35px";
        }
         downBtn.onclick=function(){
             count--;
             labelvalue.textContent=count;
             result.textContent="Counter Decrementation";
        }
        clearBtn.onclick=function(){
            count=0;
            labelvalue.textContent=count;
            result.textContent="Counter Reset";
        }
    </script>
</body>
</html>
