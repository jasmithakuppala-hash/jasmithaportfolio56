<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body{
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
            background: linear-gradient(to right, rgb(182, 227, 218), rgb(98, 218, 190),rgb(12, 184, 184));
        }
        input{
            padding: 8px;
            margin: 5px;
            width: 150px;
        }
        button{
            padding: 8px 15px;
            margin: 5px;
        }
        h2{
            color: white;
        }
    </style>
</head>
<body>

    <h1>Arithmetic Calculator</h1>

    <input type="number" id="num1" placeholder="Enter First Number"><br>
    <input type="number" id="num2" placeholder="Enter Second Number"><br>

    <button onclick="add()">+</button>
    <button onclick="subtract()">-</button>
    <button onclick="multiply()">*</button>
    <button onclick="divide()">/</button>
    <h2 id="result"></h2>
<script>
    const num1= document.getElementById("num1");
    const num2= document.getElementById("num2");
    const res=document.getElementById("result");
    function add()
{
    let result= parseInt(num1.value)+ parseInt(num2.value);
    res.textContent="Result :"+ result; 
}
  function subtract()
{
    let result= parseInt(num1.value)- parseInt(num2.value);
    res.textContent="Result :"+ result; 
}
 function multiply()
{
    let result= parseInt(num1.value)* parseInt(num2.value);
    res.textContent="Result :"+ result; 
}
 function divide()
{
    let result= parseInt(num1.value)/ parseInt(num2.value);
    res.textContent="Result :"+ result; 
}
</script>
</body>
</html>
