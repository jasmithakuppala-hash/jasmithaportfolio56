<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="main" class="heading">This is main heading</h1>
    <p class="pclass">This is a sample text</p>
    <script>
       let h1Element=document.querySelector(".heading");
       h1Element.style.color="Red";
       h1Element.style.fontWeight="bold";
       let pElement=document.querySelector(".pclass");
       pElement.style.color="green";
       pElement.style.fontweight="bold"
    </script>
</body>
</html>
