<body>
    <script>
        let a=[10,20,"name",12.30];

         console.log(item+ " :"+index);

        //list.forEach((item)=>{console.log(item)})

        let fruits=["apple","banana","orange","grapes"];
        fruits.forEach((fruit)=>{console.log(fruit)});

            console.log("Welcome");
        }
        message();
        function add(a,b){
            return a+b;
        }
        let result = add(10,20);
        console.log(add(30,50));
        console.log(result);
        //arrow function
        const multiply=(a,b) =>{
            return a*b;
        }
        console.log(multiply(20,30));
        //arrow function without argumnets
        let greet=()=>{
            console.log("Hi, Good Morning!");
        };
        greet();
        let adding=()=>{
            let a=20;
            let b=30;
            return a+b;
        };
        console.log(adding());
        let product=(a,b)=>{
            return a*b;
        };
        console.log(product (20,10));
