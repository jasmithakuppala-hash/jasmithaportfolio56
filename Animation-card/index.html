<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced CSS Animations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>
<style>
    body {
    margin: 100px;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #8ea3ff, #5b397c);
    text-align: center;
    }
    .main{
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 20px;
    }
     
    .card{
        width: 260px;
        background: linear-gradient(to right, #f7ff66, #d2f704);
        border-radius: 25px;
        padding: 20px;
        border: 5px solid #767676;
        transition: all 0.5s ease;
    }
    .card:hover{
        transform: translate(-5px,-5px);
    }
    button{
        padding:10px;
        background-color:rgb(255, 60, 60);
        color:rgb(165, 42, 42);
        font-weight: bold;
        transition: background-color 0.3s ease, color 0.3s ease;
        border-radius: 25px;
    }
    .slide-card{
       animation: slideIn 2s forwards;
    }
    .bounce-card{
        animation: bounce 2s ease infinite;
    }
    .rotate-card{
        animation: rotate 3s ease infinite;
    }
    .pulse-card{
        animation: pulse 2s ease infinite;
    }
    .fade-card{
        animation: fade 2s ease infinite;
    }
    h1{
        transition: all 3s ease;
        
    }
    h1:hover{
  
   color:#a53c03;
   box-shadow: 3px 3px 2px green;
    }
    .loader{
        height:50px;
        width:50px;
        border-radius:50%;
        border:5px solid white;
        margin:auto;
        border-top:6px solid #66ccee;
        animation: spinner 2s ease infinite;
       
    }
    @keyframes spinner{
        0%{transform: rotate(0deg);}
        100%{transform:rotate(360deg);}

    }

    @keyframes fade{
        0% {opacity:1;}
        50% {opacity:0.5;}
        100% {opacity:1;}
    }
    @keyframes pulse{
        0% {transform: scale(1);}
        50% {transform: scale(1.2);}
        100% {transform: scale(1);}
    }
    @keyframes rotate{
        0%{transform: rotate(0deg);}
        50%{transform: rotate(180deg);}
        100%{transform: rotate(360deg);}
    }
    @keyframes bounce{
         0%{
           transform:translateY(0px);}
           50%{
          transform:translateY(-20px);
           }
           100%{
            transform:translateY(0px);
           }
         }
        
    @keyframes slideIn{
        from { transform :translateX(-300px) ;
        opacity: 0;}
        to { transform : translateX(0px);
        opacity: 1;}
    }
    
    button:hover{
        background-color:rgb(201, 236, 247);
        color: blue;
    } 
    .reset{
        transition: all 0.3 ease;
    }  
    .reset:hover{
        transform:translate(-5px,-5px);
        box-shadow: 5px 5px 10px yellow;
    } 
    h2:hover{
        transform: scale(0.95);
    }
    
</style>
<body>
<h1>
    Animation Examples
</h1>
<div class="main">
    <div class = "card slide-card">
        <h2> slide-in card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card bounce-card">
        <h2> bounce card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card rotate-card">
        <h2> rotate card</h2>
        <button>Click Me</button>
    </div>
     <div class = "card pulse-card">
        <h2> pulse card</h2>
        <button>Click Me</button>
     </div>
      <div class = "card fade-card">
        <h2> fade card</h2>
        <button>Click Me</button>
     </div>
     <div class = " card">
        <div class="loader"
></div>        <h2>loader card</h2>
        <button>Click Me</button>
    </div>
</div>
<button class="reset">Reset Animation</button>
</body>
</html>
